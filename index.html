<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON DASH</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }

/* Scanlines overlay */
#scanlines {
  position:fixed; inset:0; pointer-events:none; z-index:5;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.13) 2px, rgba(0,0,0,.13) 4px
  );
}
/* Vignette */
#vignette {
  position:fixed; inset:0; pointer-events:none; z-index:4;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,10,.82) 100%);
}
/* Edge flash on milestone */
#flash {
  position:fixed; inset:0; pointer-events:none; z-index:6;
  box-shadow:inset 0 0 0px transparent;
  transition:box-shadow .08s;
}
#flash.pop { box-shadow:inset 0 0 80px 20px rgba(0,255,200,.35); }

/* Speed bar */
#speedbar {
  position:fixed; bottom:0; left:0; right:0; height:3px;
  pointer-events:none; z-index:7;
  background:rgba(255,255,255,.04);
}
#speedbar-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,#00ffff,#ff3399,#ff7700);
  box-shadow:0 0 8px #00ffff;
  transition:width .3s, background .5s;
}

#ui {
  position:fixed; top:0; left:0; right:0;
  padding:16px 24px;
  display:flex; justify-content:space-between; align-items:flex-start;
  pointer-events:none;
}
.s-label { font-size:.55rem; letter-spacing:6px; color:#0a3344; text-transform:uppercase; margin-bottom:2px; }
.s-val   { font-size:2rem; font-weight:bold; letter-spacing:2px; }
#score-val { color:#00ffff; text-shadow:0 0 12px #00ffff,0 0 24px #004455; }
#coins-val { color:#ffdd00; text-shadow:0 0 10px #ffaa00; font-size:1.5rem; }
#hi-val    { color:#00ffaa; font-size:1.3rem; text-shadow:0 0 10px #00ffaa; }

#combo {
  position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
  font-size:2.6rem; font-weight:bold; letter-spacing:4px;
  color:#ffdd00; text-shadow:0 0 20px #ffaa00,0 0 40px #ff8800;
  opacity:0; pointer-events:none; transition:opacity .12s;
}
#combo.show { opacity:1; }

#overlay {
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,1,14,.93); z-index:100;
}
#overlay h1 {
  font-size:clamp(3rem,10vw,6rem); color:#00ffff;
  text-shadow:0 0 20px #00ffff,0 0 50px #008899;
  letter-spacing:12px; margin-bottom:4px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{ text-shadow:0 0 20px #00ffff,0 0 50px #008899; }
  50%    { text-shadow:0 0 35px #00ffff,0 0 80px #00ccdd,0 0 120px #003344; }
}
.tagline { color:#0d3348; letter-spacing:10px; font-size:.75rem; margin-bottom:44px; }
#final-score {
  color:#ff7040; font-size:1.3rem; letter-spacing:4px; margin-bottom:6px;
  text-shadow:0 0 18px #ff5020; display:none;
}
#hi-disp {
  color:#00ffaa; font-size:.9rem; letter-spacing:6px; margin-bottom:34px; display:none;
}
.ctrl-grid {
  display:grid; grid-template-columns:auto auto; gap:8px 24px;
  font-size:.72rem; letter-spacing:3px; margin-bottom:50px; color:#0f3344;
}
.ctrl-grid .key { color:#1a6677; }
#start-btn {
  background:transparent; border:1px solid #00ffff; color:#00ffff;
  font-family:'Courier New',monospace; font-size:.95rem; letter-spacing:8px;
  padding:14px 50px; cursor:pointer; text-shadow:0 0 8px #00ffff;
  box-shadow:0 0 20px rgba(0,255,255,.15),inset 0 0 20px rgba(0,255,255,.03);
  transition:all .3s; text-transform:uppercase;
}
#start-btn:hover {
  background:rgba(0,255,255,.07);
  box-shadow:0 0 40px rgba(0,255,255,.4),inset 0 0 30px rgba(0,255,255,.07);
}
#level-config {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}
#level-label {
  font-size:.68rem;
  letter-spacing:4px;
  color:#1ca7c4;
  text-transform:uppercase;
}
#start-level {
  width:84px;
  padding:7px 10px;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(0,255,255,.65);
  color:#00ffff;
  font-family:'Courier New',monospace;
  font-size:1rem;
  text-align:center;
}
#start-level:focus { outline:none; box-shadow:0 0 12px rgba(0,255,255,.3); }
#version-tag {
  margin-top:14px;
  font-size:.7rem;
  letter-spacing:5px;
  color:#15a8a8;
  text-transform:uppercase;
  text-shadow:0 0 10px rgba(0,255,255,.35);
}

/* Math challenge overlay */
#math-overlay {
  position:fixed; inset:0; z-index:200;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(7,12,24,.93);
  font-family:'Courier New',monospace;
  padding:24px;
}
#math-overlay.show { display:flex; }
#math-header {
  font-size:.74rem; letter-spacing:4px; color:#f3d4df;
  margin-bottom:8px; text-transform:uppercase;
}
#math-lives { font-size:1rem; letter-spacing:4px; color:#ff5555; margin-bottom:10px; }
#math-topic {
  font-size:.7rem; letter-spacing:2px; color:#d8e9ff;
  text-transform:uppercase; margin-bottom:14px;
}
#math-card {
  width:min(880px, 96vw);
  border:2px solid #2c3b54;
  background:#f4f8ff;
  color:#172233;
  box-shadow:0 12px 28px rgba(0,0,0,.35);
  border-radius:10px;
  padding:20px;
}
#math-question {
  font-size:clamp(1.05rem,2.4vw,1.4rem);
  font-weight:bold;
  color:#172233;
  text-shadow:none;
  letter-spacing:.4px;
  margin-bottom:14px;
  line-height:1.35;
}
#math-input-area { margin-bottom:12px; }
#math-input-area.hidden { display:none; }
.math-input-row {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.math-part-label {
  min-width:28px;
  font-weight:bold;
  color:#20344f;
}
.math-part-prompt {
  flex:1;
  color:#172233;
  line-height:1.25;
}
.math-input-field {
  min-width:110px;
  max-width:180px;
  padding:8px 10px;
  border:1px solid #8ea6c4;
  border-radius:6px;
  font-family:'Courier New',monospace;
  font-size:1rem;
  color:#172233;
  background:#fff;
}
.math-input-field:focus {
  outline:none;
  border-color:#3d6ea5;
  box-shadow:0 0 0 2px rgba(74,126,185,.2);
}
#math-choices {
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:10px;
}
.math-choice {
  background:#fff; border:1px solid #8ea6c4; color:#172233;
  font-family:'Courier New',monospace;
  font-size:clamp(1.15rem,2.6vw,1.55rem);
  letter-spacing:.4px;
  line-height:1.2;
  padding:14px 12px;
  cursor:pointer;
  text-shadow:none;
  transition:all .2s;
  text-transform:none;
  text-align:center;
  border-radius:8px;
}
.math-choice:hover {
  background:#eef5ff;
  border-color:#3d6ea5;
}
#math-submit-btn {
  margin-top:8px;
  background:#3d6ea5;
  border:1px solid #365f8f;
  color:#fff;
  font-family:'Courier New',monospace;
  font-size:.95rem;
  letter-spacing:1px;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
}
#math-submit-btn:hover { background:#335883; }
#math-submit-btn.hidden { display:none; }
#math-choices.hidden { display:none; }
#math-submit-btn:disabled, .math-choice:disabled {
  opacity:.65;
  cursor:not-allowed;
}
#math-feedback {
  font-size:.95rem;
  letter-spacing:.2px;
  min-height:1.5rem;
  margin-top:14px;
  line-height:1.35;
}
#math-feedback.correct { color:#0f7d3f; text-shadow:none; }
#math-feedback.wrong   { color:#b3261e; text-shadow:none; }
#math-tip {
  margin-top:14px;
  font-size:.62rem;
  letter-spacing:2px;
  color:#9fb6d8;
  text-transform:uppercase;
}
@media (max-width: 680px) {
  #math-choices { grid-template-columns:1fr; }
}

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="flash"></div>
<div id="speedbar"><div id="speedbar-fill"></div></div>

<div id="ui">
  <div>
    <div class="s-label">Score</div>
    <div class="s-val" id="score-val">0</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center">
    <div class="s-label" style="text-align:center">Best</div>
    <div class="s-val" id="hi-val">0</div>
  </div>
  <div style="text-align:right">
    <div class="s-label">Coins</div>
    <div class="s-val" id="coins-val">0</div>
  </div>
</div>

<div id="combo"></div>

<div id="math-overlay">
  <div id="math-header">fraction rescue round</div>
  <div id="math-lives"></div>
  <div id="math-topic"></div>
  <div id="math-card">
    <div id="math-question"></div>
    <div id="math-input-area" class="hidden"></div>
    <div id="math-choices"></div>
    <button id="math-submit-btn" class="hidden" type="button">Submit Answer</button>
    <div id="math-feedback"></div>
  </div>
  <div id="math-tip">Pick the correct answer to keep running</div>
</div>

<div id="overlay">
  <h1>NEON DASH</h1>
  <div class="tagline">ENDLESS RUNNER</div>
  <div id="version-tag"></div>
  <div id="final-score"></div>
  <div id="hi-disp"></div>
  <div class="ctrl-grid">
    <span class="key">← → / A D</span><span>CHANGE LANE</span>
    <span class="key">SPACE / ↑</span><span>JUMP</span>
    <span class="key">SWIPE</span><span>MOBILE</span>
  </div>
  <div id="level-config">
    <label id="level-label" for="start-level">Start Level</label>
    <input id="start-level" type="number" min="1" max="100" step="1" value="1"/>
  </div>
  <button id="start-btn" onclick="startGame()">Initialize</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']] },
  svg: { fontCache: 'global' },
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script>
'use strict';
const GAME_VERSION = '2.3.3';
document.getElementById('version-tag').textContent = `Version ${GAME_VERSION}`;

// ── RENDERER ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x01010f);
scene.fog = new THREE.FogExp2(0x01010f, 0.015);

const worldGrp = new THREE.Group();
scene.add(worldGrp);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 300);
camera.position.set(0, 6, 12);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTS ────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1a33, 3));
const dirLight = new THREE.DirectionalLight(0x7799cc, 0.6);
dirLight.position.set(5, 20, 5);
scene.add(dirLight);
const playerLight = new THREE.PointLight(0xff3399, 3, 15);
scene.add(playerLight);
const trackGlow = new THREE.PointLight(0x0066ff, 1.5, 35);
trackGlow.position.set(0, 2, -15);
scene.add(trackGlow);

// ── STARS (3 parallax layers + shooting stars) ───────────────
const starLayers = [];
const starSpeeds = [0.008, 0.022, 0.055]; // slow/mid/fast parallax
const starCounts = [1200, 800, 400];
const starSizes  = [0.22, 0.35, 0.55];
const starColors = [0x8899cc, 0xaaccff, 0xffffff];
for (let L=0; L<3; L++) {
  const n=starCounts[L], pos=new Float32Array(n*3), phase=new Float32Array(n);
  for (let i=0;i<n;i++){
    pos[i*3]  =(Math.random()-.5)*600;
    pos[i*3+1]=8+Math.random()*140;
    pos[i*3+2]=(Math.random()-.5)*800;
    phase[i]  =Math.random()*Math.PI*2;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('phase',   new THREE.Float32BufferAttribute(phase,1));
  const mat=new THREE.PointsMaterial({color:starColors[L],size:starSizes[L],transparent:true,opacity:.7});
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  starLayers.push({pts, mat, speed:starSpeeds[L], phase});
}

// Shooting star pool
const SHOOT_COUNT = 6;
const shooters = [];
for (let i=0;i<SHOOT_COUNT;i++){
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(6),3));
  const mat=new THREE.LineBasicMaterial({color:0xddeeff,transparent:true,opacity:0,linewidth:1});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  shooters.push({line,mat,geo,active:false,timer:0,duration:0,x:0,y:0,z:0,dx:0,dy:0,dz:0,len:0});
}
let shootSpawnTimer=0;

// ── CITYSCAPE SILHOUETTE ──────────────────────────────────────
const cityGrp = new THREE.Group();
scene.add(cityGrp);

const buildingProfiles = [
  [2,8],[3,14],[2,10],[4,20],[2,9],[5,26],[3,13],[4,18],[2,7],[4,22],[3,11],[3,16],[2,8],[5,24],[2,10],[3,15]
];

// Neon accent colors for rooftop strips
const neonColors = [0x00ffff, 0xff00ff, 0x7700ff, 0x00ff88, 0xff3399];

[-1,1].forEach(side=>{
  let xCursor = side * 22;
  buildingProfiles.forEach(([w,h],i)=>{
    const bw = w * 1.1;
    const bx = xCursor;
    xCursor += (bw + 0.4) * side;

    // Dark silhouette body — fog:false so it shows regardless of distance
    const bodyMat = new THREE.MeshBasicMaterial({color:0x04040f, fog:false});
    const body = new THREE.Mesh(new THREE.BoxGeometry(bw, h, 1.2), bodyMat);
    body.position.set(bx, h/2, -72);
    cityGrp.add(body);

    // Neon rooftop strip
    const nc = neonColors[i % neonColors.length];
    const roofMat = new THREE.MeshBasicMaterial({color:nc, fog:false});
    const roof = new THREE.Mesh(new THREE.BoxGeometry(bw+.1, .2, 1.3), roofMat);
    roof.position.set(bx, h+.1, -72);
    cityGrp.add(roof);

    // Vertical neon edge lines
    const edgeMat = new THREE.MeshBasicMaterial({color:nc, transparent:true, opacity:.4, fog:false});
    [-bw/2, bw/2].forEach(ex=>{
      const edge = new THREE.Mesh(new THREE.BoxGeometry(.08, h, .15), edgeMat);
      edge.position.set(bx+ex, h/2, -71.3);
      cityGrp.add(edge);
    });

    // Windows — bright grid of small rectangles
    const winColors = [0x00ffff, 0xffff88, 0xff88ff, 0x88ffff];
    const cols = Math.max(1, Math.floor(bw/1.1));
    const rows = Math.max(1, Math.floor(h/2.5));
    for (let wr=0; wr<rows; wr++) {
      for (let wc=0; wc<cols; wc++) {
        if (Math.random() < 0.55) continue; // ~45% of windows lit
        const wc2 = neonColors[(i+wr+wc)%neonColors.length];
        const wMat = new THREE.MeshBasicMaterial({
          color: winColors[Math.floor(Math.random()*winColors.length)],
          transparent:true, opacity:.7+Math.random()*.3, fog:false
        });
        const win = new THREE.Mesh(new THREE.BoxGeometry(.35, .4, .1), wMat);
        const wx2 = bx - bw/2 + .4 + wc*(bw/cols);
        const wy2 = 0.8 + wr*2.2 + Math.random()*.3;
        win.position.set(wx2, wy2, -71.2);
        cityGrp.add(win);
      }
    }
  });
});


// ── SPEED LINES ───────────────────────────────────────────────
const SLINE_COUNT = 32;
const speedLines = [];
const sLineMat = new THREE.LineBasicMaterial({color:0x00ffff,transparent:true,opacity:0,depthWrite:false});
for (let i=0;i<SLINE_COUNT;i++){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(6);
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  const mat=sLineMat.clone();
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  const angle=((i/SLINE_COUNT)*Math.PI*2);
  const r=3+Math.random()*5;
  speedLines.push({line,geo,mat,pos,angle,r,z:-Math.random()*20,len:0});
}


// ── CONSTANTS ────────────────────────────────────────────────
const LANES      = [-2.5, 0, 2.5];
const CHUNK_LEN  = 50;
const NUM_CHUNKS = 8;
const RECYCLE_Z  = 65;
const BALL_R     = 0.62;
const GRAVITY    = 0.013;

// ── MATERIALS ────────────────────────────────────────────────
const M = {
  floor:    new THREE.MeshLambertMaterial({color:0x06061a}),
  rail:     new THREE.MeshBasicMaterial({color:0x00ffff}),
  wall:     new THREE.MeshLambertMaterial({color:0x030316}),
  grid:     new THREE.LineBasicMaterial({color:0x0d2a55,transparent:true,opacity:.9}),
  obs:      new THREE.MeshLambertMaterial({color:0xff1155,emissive:0xff0033,emissiveIntensity:.8}),
  obsGlow:  new THREE.MeshBasicMaterial({color:0xff0044,transparent:true,opacity:.7}),
  obsMove:  new THREE.MeshLambertMaterial({color:0xff6600,emissive:0xff4400,emissiveIntensity:.9}),
  coin:     new THREE.MeshLambertMaterial({color:0xffdd00,emissive:0xffbb00,emissiveIntensity:1}),
  ramp:     new THREE.MeshLambertMaterial({color:0x00ffaa,emissive:0x00bb77,emissiveIntensity:.7}),
  rampEdge: new THREE.MeshBasicMaterial({color:0x00ffcc,transparent:true,opacity:.9}),
};

// ── BALL ─────────────────────────────────────────────────────
const pg = new THREE.Group();
worldGrp.add(pg);

const ballMat = new THREE.MeshLambertMaterial({color:0xff3399,emissive:0xcc0066,emissiveIntensity:.7});
const ball = new THREE.Mesh(new THREE.SphereGeometry(BALL_R,24,20), ballMat);
ball.position.y = BALL_R;
pg.add(ball);

const wireMat = new THREE.MeshBasicMaterial({color:0xff88dd,wireframe:true,transparent:true,opacity:.35});
const wire = new THREE.Mesh(new THREE.SphereGeometry(BALL_R+.04,10,8), wireMat);
wire.position.y = BALL_R;
pg.add(wire);

const band = new THREE.Mesh(
  new THREE.TorusGeometry(BALL_R,.045,8,36),
  new THREE.MeshBasicMaterial({color:0x00ffff})
);
band.position.y = BALL_R;
pg.add(band);

const shadowMat = new THREE.MeshBasicMaterial({color:0xff0066,transparent:true,opacity:.28,depthWrite:false});
const blobShadow = new THREE.Mesh(new THREE.CircleGeometry(BALL_R*.85,20), shadowMat);
blobShadow.rotation.x = -Math.PI/2;
blobShadow.position.y = .005;
pg.add(blobShadow);

// ── GHOST TRAIL ──────────────────────────────────────────────
const TRAIL_COUNT = 7;
const trailPool = [];
for (let i=0;i<TRAIL_COUNT;i++) {
  const mat = new THREE.MeshBasicMaterial({color:0xff3399,transparent:true,opacity:.25,depthWrite:false});
  const g = new THREE.Mesh(new THREE.SphereGeometry(BALL_R*(1-i*.07),8,6), mat);
  g.visible = false;
  scene.add(g);
  trailPool.push({mesh:g, mat, x:0, y:BALL_R, z:0});
}
let trailTick = 0;

// ── COIN SPARKS ──────────────────────────────────────────────
const SPARK_GROUPS = 8; // max simultaneous bursts
const sparkPool = [];
for (let g=0;g<SPARK_GROUPS;g++){
  const NSPARK=10;
  const pos=new Float32Array(NSPARK*3);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0xffdd00,size:.28,transparent:true,opacity:0,depthWrite:false});
  const pts=new THREE.Points(geo,mat);
  scene.add(pts);
  const vels=[];
  for(let i=0;i<NSPARK;i++) vels.push({vx:0,vy:0,vz:0});
  sparkPool.push({pts,mat,geo,pos,vels,active:false,timer:0});
}

function burstSparks(wx, wy, wz) {
  const g=sparkPool.find(s=>!s.active);
  if (!g) return;
  g.active=true; g.timer=28;
  for(let i=0;i<10;i++){
    const a=Math.random()*Math.PI*2, el=(Math.random()-.5)*Math.PI;
    const sp=.08+Math.random()*.12;
    g.vels[i]={vx:Math.cos(a)*Math.cos(el)*sp, vy:Math.abs(Math.sin(el))*sp+.04, vz:Math.sin(a)*Math.cos(el)*sp};
    g.pos[i*3]=wx; g.pos[i*3+1]=wy; g.pos[i*3+2]=wz;
  }
  g.geo.attributes.position.needsUpdate=true;
  g.mat.opacity=1; g.mat.color.set(0xffdd00);
  g.pts.visible=true;
}


// ── CHUNK BUILDERS ───────────────────────────────────────────
function buildGrid() {
  const v=[];
  for (const x of [-4,-2.5,0,2.5,4]) v.push(x,0,0,x,0,CHUNK_LEN);
  for (let z=0;z<=CHUNK_LEN;z+=5) v.push(-4,0,z,4,0,z);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  return new THREE.LineSegments(geo,M.grid);
}

function addBase(grp) {
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(8,CHUNK_LEN),M.floor);
  floor.rotation.x=-Math.PI/2; floor.position.z=-CHUNK_LEN/2;
  grp.add(floor);
  const grid=buildGrid(); grid.position.set(0,.01,-CHUNK_LEN);
  grp.add(grid);
  for (const x of [-4,4]) {
    const r=new THREE.Mesh(new THREE.BoxGeometry(.07,.18,CHUNK_LEN),M.rail);
    r.position.set(x,.09,-CHUNK_LEN/2); grp.add(r);
  }
  for (const x of [-4.35,4.35]) {
    const w=new THREE.Mesh(new THREE.BoxGeometry(.12,.85,CHUNK_LEN),M.wall);
    w.position.set(x,.42,-CHUNK_LEN/2); grp.add(w);
  }
}

function addObs(grp, safe) {
  if (safe) return [];
  if (Math.random() < .1) return [];
  const obs=[], taken=new Set();
  const count=2+Math.floor(Math.random()*3);
  for (let i=0;i<count;i++) {
    const lane=Math.floor(Math.random()*3);
    const slot=Math.floor(Math.random()*7);
    const key=lane+'_'+slot;
    if (taken.has(key)) continue;
    taken.add(key);
    const zLocal=-(10+slot*5);
    const kind=Math.random();
    let w,h,d,moving=false,moveSpeed=0,moveDir=1;
    if (kind<.25)      {w=1.1;h=.52; d=1.1;}
    else if (kind<.5)  {w=.7; h=1.65;d=.8;}
    else if (kind<.75) {w=1.0;h=1.1+Math.random()*.35;d=.9;}
    else               {w=1.0;h=1.0;d=.9; moving=true; moveSpeed=.026+Math.random()*.028; moveDir=Math.random()<.5?1:-1;}
    const mat=moving?M.obsMove:M.obs;
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    mesh.position.set(LANES[lane],h/2,zLocal); grp.add(mesh);
    const capMat=moving?new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:.8}):M.obsGlow;
    const cap=new THREE.Mesh(new THREE.BoxGeometry(w+.04,.06,d+.04),capMat);
    cap.position.set(LANES[lane],h+.03,zLocal); grp.add(cap);
    obs.push({mesh,cap,lane,zLocal,h,w,moving,moveSpeed,moveDir,laneF:lane+0});
  }
  return obs;
}

function addCoins(grp, safe) {
  if (safe) return [];
  const coins=[];
  const numArcs=Math.random()<.55?2:1;
  for (let a=0;a<numArcs;a++) {
    const lane=Math.floor(Math.random()*3);
    const z0=-(10+a*17+Math.random()*10);
    const n=5+Math.floor(Math.random()*5);
    for (let i=0;i<n;i++) {
      const zLocal=z0-i*1.8;
      const mesh=new THREE.Mesh(new THREE.TorusGeometry(.22,.07,8,14),M.coin);
      mesh.position.set(LANES[lane],1.1+Math.sin(i*.65)*.42,zLocal);
      mesh.rotation.x=Math.PI/2;
      grp.add(mesh);
      coins.push({mesh,lane,zLocal,collected:false});
    }
  }
  return coins;
}

function addRamps(grp, safe) {
  if (safe||Math.random()<.45) return [];
  const ramps=[];
  const RAMP_D=3.5,RAMP_H=1.1;
  const angle=Math.atan2(RAMP_H,RAMP_D);
  const lane=Math.floor(Math.random()*3);
  const zLocal=-(12+Math.floor(Math.random()*4)*6);
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.6,.15,RAMP_D),M.ramp);
  mesh.rotation.x=angle; mesh.position.set(LANES[lane],RAMP_H/2,zLocal-RAMP_D/2);
  grp.add(mesh);
  const lip=new THREE.Mesh(new THREE.BoxGeometry(1.65,.12,.18),M.rampEdge);
  lip.position.set(LANES[lane],RAMP_H+.06,zLocal-RAMP_D); grp.add(lip);
  for (let i=0;i<2;i++) {
    const ch=new THREE.Mesh(new THREE.BoxGeometry(.3,.08,.5),M.rampEdge);
    ch.rotation.x=angle;
    ch.position.set(LANES[lane]+(i===0?-.4:.4),RAMP_H*.5,zLocal-RAMP_D*.5);
    grp.add(ch);
  }
  const arcCoins=[],launchVY=.28,n=6;
  for (let i=0;i<n;i++) {
    const t=(i+1)/(n+1);
    const zArc=(zLocal-RAMP_D)-t*12;
    const tTime=t*1.6;
    const yArc=RAMP_H+launchVY*tTime*18-.5*.013*(tTime*18)**2;
    const coinM=new THREE.Mesh(new THREE.TorusGeometry(.22,.07,8,14),M.coin);
    coinM.position.set(LANES[lane],Math.max(.8,yArc),zArc);
    coinM.rotation.x=Math.PI/2; grp.add(coinM);
    arcCoins.push({mesh:coinM,lane,zLocal:zArc,collected:false});
  }
  ramps._arcCoins=arcCoins;
  ramps.push({lane,zFront:zLocal,zBack:zLocal-RAMP_D,h:RAMP_H,launchVY});
  return ramps;
}

function disposeGroup(grp) {
  while (grp.children.length) {
    const c=grp.children[0]; grp.remove(c);
    if (c.geometry) c.geometry.dispose();
  }
}

// ── CHUNK POOL ───────────────────────────────────────────────
let chunks=[];

function newChunk(z, safe=false) {
  const grp=new THREE.Group(); grp.position.z=z; addBase(grp); worldGrp.add(grp);
  const ramps=addRamps(grp,safe);
  const coins=addCoins(grp,safe);
  if (ramps._arcCoins) coins.push(...ramps._arcCoins);
  return {grp, obs:addObs(grp,safe), coins, ramps};
}

function recycleChunk(c) {
  let minZ=Infinity;
  chunks.forEach(ch=>{if(ch.grp.position.z<minZ) minZ=ch.grp.position.z;});
  disposeGroup(c.grp);
  c.grp.position.z=minZ-CHUNK_LEN;
  addBase(c.grp);
  c.obs=addObs(c.grp,false);
  const ramps=addRamps(c.grp,false);
  const coins=addCoins(c.grp,false);
  if (ramps._arcCoins) coins.push(...ramps._arcCoins);
  c.coins=coins; c.ramps=ramps;
}

function initChunks() {
  chunks.forEach(c=>{disposeGroup(c.grp); worldGrp.remove(c.grp);});
  chunks=[];
  for (let i=0;i<NUM_CHUNKS;i++) chunks.push(newChunk(-i*CHUNK_LEN,i<2));
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fracTex(n, d) {
  return `\\(\\frac{${n}}{${d}}\\)`;
}

function mixedTex(w, n, d) {
  return `\\(${w}\\frac{${n}}{${d}}\\)`;
}

function toMathLabel(value) {
  const mixed = /^(\d+)\s+(\d+)\/(\d+)$/.exec(value);
  if (mixed) return mixedTex(mixed[1], mixed[2], mixed[3]);
  const frac = /^(\d+)\/(\d+)$/.exec(value);
  if (frac) return fracTex(frac[1], frac[2]);
  if (/^\d+$/.test(value)) return `\\(${value}\\)`;
  return value;
}

function typesetMath(scope) {
  if (!window.MathJax || !window.MathJax.typesetPromise) return;
  window.MathJax.typesetPromise([scope]).catch(()=>{});
}

function gcd(a,b){
  let x=Math.abs(a), y=Math.abs(b);
  while (y){const t=y; y=x%y; x=t;}
  return x||1;
}

function parseRational(raw) {
  const value=String(raw||'').trim();
  if (!value) return null;
  let m=/^(\d+)\s+(\d+)\/(\d+)$/.exec(value);
  if (m) {
    const w=Number(m[1]), n=Number(m[2]), d=Number(m[3]);
    if (!d) return null;
    const num=w*d+n;
    const g=gcd(num,d);
    return {num:num/g, den:d/g};
  }
  m=/^(\d+)\/(\d+)$/.exec(value);
  if (m) {
    const n=Number(m[1]), d=Number(m[2]);
    if (!d) return null;
    const g=gcd(n,d);
    return {num:n/g, den:d/g};
  }
  m=/^\d+$/.exec(value);
  if (m) return {num:Number(m[0]), den:1};
  return null;
}

function normalizeText(raw) {
  return String(raw||'').trim().toLowerCase();
}

function evaluateAnswer(input, expected, answerType='auto') {
  if (answerType==='text') return normalizeText(input)===normalizeText(expected);
  if (answerType==='number') {
    const lhs=String(input||'').trim(), rhs=String(expected||'').trim();
    if (!/^\d+$/.test(lhs) || !/^\d+$/.test(rhs)) return false;
    return Number(lhs)===Number(rhs);
  }
  const lhs=parseRational(input), rhs=parseRational(expected);
  if (lhs&&rhs) return lhs.num===rhs.num && lhs.den===rhs.den;
  return normalizeText(input)===normalizeText(expected);
}

function makeChoiceSet(correct, distractors) {
  const unique = [...new Set([correct, ...distractors.filter(d => d !== correct)])];
  return shuffle(unique.slice(0, 4));
}

function makeQuestionWriteFraction() {
  const den = randInt(2, 10);
  const num = randInt(1, den - 1);
  return {
    kind:'fillIn',
    topic:'Introduction to fractions',
    text:`A fraction has a numerator of \\(${num}\\) and a denominator of \\(${den}\\). Write the fraction.`,
    answer:`${num}/${den}`,
    answerType:'fraction',
    placeholder:'e.g. 3/5',
  };
}

function makeQuestionIntroFractions() {
  const den = randInt(2, 8);
  const num = randInt(1, den - 1);
  const choices = makeChoiceSet(
    'How many equal parts the whole has',
    [
      'How many parts are shaded',
      'How many wholes there are',
      'How many fractions to subtract',
    ]
  );
  return {
    kind:'mcq',
    topic: 'Introduction to fractions',
    text: `In ${fracTex(num, den)}, what does the denominator tell us?`,
    answer: 'How many equal parts the whole has',
    choices,
  };
}

function makeQuestionParts() {
  const den = randInt(3, 9);
  const num = randInt(1, den - 1);
  const askNum = Math.random() < 0.5;
  const prompt = askNum
    ? `In ${fracTex(num, den)}, what is the numerator?`
    : `In ${fracTex(num, den)}, what is the denominator?`;
  const answer = String(askNum ? num : den);
  const choices = makeChoiceSet(answer, [
    String(num + 1),
    String(Math.max(1, den - 1)),
    String(den + 1),
  ]);
  return {
    kind:'mcq',
    topic: 'Parts of a fraction',
    text: prompt,
    answer,
    choices,
  };
}

function makeQuestionPictures() {
  const den = randInt(4, 8);
  const shaded = randInt(1, den - 1);
  const bar = `${'■'.repeat(shaded)}${'□'.repeat(den - shaded)}`;
  const answer = String(shaded);
  const choices = makeChoiceSet(answer, [String(den-shaded), String(den), String(Math.max(1, shaded-1))]);
  return {
    kind:'mcq',
    topic: 'Representing fractions with pictures',
    text: `Shade model: ${bar}<br/>How many pieces are shaded in ${fracTex(shaded, den)} of the whole bar?`,
    answer,
    choices,
  };
}

function makeQuestionEquivalent() {
  const den = randInt(2, 6);
  const num = randInt(1, den - 1);
  const mul = randInt(2, 3);
  const answer = `${num * mul}/${den * mul}`;
  const choices = makeChoiceSet(answer, [
    `${num + mul}/${den * mul}`,
    `${num * mul}/${den + mul}`,
    `${num + 1}/${den + 1}`,
  ]);
  return {
    kind:'mcq',
    topic: 'Equivalent fractions',
    text: `Which fraction is equivalent to ${fracTex(num, den)}?`,
    answer,
    choices,
  };
}

function makeQuestionMixedNumbers() {
  const whole = randInt(1, 4);
  const den = randInt(2, 6);
  const num = randInt(1, den - 1);
  return {
    kind:'multiPart',
    topic: 'Mixed numbers',
    text: `Write the integer part and the fractional part for ${mixedTex(whole,num,den)}.`,
    parts:[
      {label:'a)', prompt:'Integer part', answer:String(whole), answerType:'number'},
      {label:'b)', prompt:'Fraction part', answer:`${num}/${den}`, answerType:'fraction'},
    ],
    restoreThreshold:1,
  };
}

function makeQuestionComparing() {
  const byUnit=Math.random()<.5;
  let left,right;
  if (byUnit) {
    const d1=randInt(3,12), d2=randInt(2,11);
    if (d1===d2) right=`1/${d2+1}`; else right=`1/${d2}`;
    left=`1/${d1}`;
  } else {
    const den=randInt(4,10);
    const n1=randInt(1,den-2), n2=randInt(n1+1,den-1);
    left=`${n1}/${den}`; right=`${n2}/${den}`;
  }
  const L=parseRational(left), R=parseRational(right);
  const greater=(L.num/L.den)>(R.num/R.den)?left:right;
  const choices = makeChoiceSet(greater, [left===greater?right:left, 'They are equal', `${randInt(1,3)}/${randInt(4,9)}`]);
  return {
    kind:'mcq',
    topic: 'Comparing fractions',
    text: `Circle the largest fraction in this pair: ${toMathLabel(left)} or ${toMathLabel(right)}.`,
    answer: greater,
    choices,
  };
}

function makeQuestionAddition() {
  const den = randInt(3, 10);
  const a = randInt(1, den - 2);
  const b = randInt(1, den - a);
  const sum = a + b;
  const answer = sum === den ? '1' : `${sum}/${den}`;
  const choices = makeChoiceSet(answer, [
    `${Math.max(1, sum - 1)}/${den}`,
    `${sum}/${den + 1}`,
    `${sum + 1}/${den}`,
  ]);
  return {
    kind:'mcq',
    topic: 'Basic fraction addition',
    text: `Add: ${fracTex(a, den)} + ${fracTex(b, den)} = ?`,
    answer,
    choices,
  };
}

function makeQuestionWordProblem() {
  const total = 8;
  const friends = 4;
  const each = 1;
  const givenAway=friends*each;
  const left=total-givenAway;
  return {
    kind:'multiPart',
    topic: 'Fractions in real-life word problems',
    text: `Sally cut a pizza into ${total} equal slices. She gave ${each} slice to each of her ${friends} friends.`,
    parts:[
      {label:'a)', prompt:'How many slices were given away?', answer:String(givenAway), answerType:'number'},
      {label:'b)', prompt:'How many slices were left?', answer:String(left), answerType:'number'},
      {label:'c)', prompt:'What fraction of the pizza was left?', answer:`${left}/${total}`, answerType:'fraction'},
    ],
    restoreThreshold:2,
  };
}

function makeQuestionFractionOfQuantity() {
  const useTime = Math.random()<.5;
  const denominator = useTime ? 4 : 3;
  const quantity = useTime ? 60 : 12;
  const unit = useTime ? 'hour' : 'year';
  const noun = useTime ? 'minutes' : 'months';
  const answer = String(quantity / denominator);
  return {
    kind:'fillIn',
    topic: 'Finding fractions of a quantity',
    text: `Fill in the blank: How many ${noun} are in ${fracTex(1, denominator)} of a ${unit}?`,
    answer,
    answerType:'number',
    placeholder:`${noun}...`,
  };
}

const fractionQuestionBuilders = [
  makeQuestionWriteFraction,
  makeQuestionIntroFractions,
  makeQuestionParts,
  makeQuestionPictures,
  makeQuestionEquivalent,
  makeQuestionMixedNumbers,
  makeQuestionComparing,
  makeQuestionAddition,
  makeQuestionWordProblem,
  makeQuestionFractionOfQuantity,
];

const multipartPassRatio = .67;

function generateQuestion() {
  const builder = fractionQuestionBuilders[fractionTopicIndex];
  fractionTopicIndex = (fractionTopicIndex + 1) % fractionQuestionBuilders.length;
  return builder();
}

  mathFeedback.className = '';

  mathInputArea.querySelectorAll('.math-input-field').forEach(input=>{input.disabled=true;});
  mathSubmitBtn.disabled=true;

  const q=currentFractionQuestion;
  let passed=false;
  let feedbackHtml='';

  if (q.kind==='mcq') {
    passed = selectedAnswer === q.answer;
    feedbackHtml = passed ? '✓ Correct' : `✗ Incorrect — answer was ${toMathLabel(q.answer)}`;
  }

  if (q.kind==='fillIn') {
    const entered=(document.getElementById('math-input-single')?.value||'').trim();
    passed = evaluateAnswer(entered, q.answer, q.answerType||'auto');
    feedbackHtml = passed ? '✓ Correct' : `✗ Incorrect — expected ${toMathLabel(q.answer)}`;
  }

  if (q.kind==='multiPart') {
    let correctCount=0;
    const detailRows=[];
    q.parts.forEach((part, idx)=>{
      const entered=(document.getElementById(`math-input-part-${idx}`)?.value||'').trim();
      const ok=evaluateAnswer(entered, part.answer, part.answerType||'auto');
      if (ok) correctCount++;
      detailRows.push(`${part.label||`${String.fromCharCode(97+idx)})`} ${ok?'✓':'✗'} ${part.prompt}${ok?'':` (ans: ${toMathLabel(part.answer)})`}`);
    });
    const threshold=q.restoreThreshold ?? Math.max(1, Math.ceil(q.parts.length*multipartPassRatio));
    passed = correctCount>=threshold;
    feedbackHtml = `${passed?'✓':'✗'} ${correctCount}/${q.parts.length} parts correct (need ${threshold})<br/>${detailRows.join('<br/>')}`;
  }

  if (passed) {
    if (pendingLifeRestore) lives=Math.min(3,lives+1);
    pendingLifeRestore=false;
    mathFeedback.textContent = `✓ CORRECT — LIFE RESTORED (${lives}/3)`;
    mathFeedback.className = 'correct';
    setTimeout(resumeAfterMath, 700);
  } else {
    pendingLifeRestore=false;
    mathFeedback.innerHTML = feedbackHtml;
    mathFeedback.className = 'wrong';
    if (lives<=0) {
      setTimeout(realGameOver, 1200);
    } else {
      setTimeout(resumeAfterMath, 1200);
    }
  }
  typesetMath(mathFeedback);
}

mathSubmitBtn.addEventListener('click', ()=>submitMath());
mathOverlay.addEventListener('keydown', e=>{
  if (e.key==='Enter' && !mathSubmitBtn.classList.contains('hidden') && !mathSubmitBtn.disabled) {
    e.preventDefault();
    submitMath();
  }
});

function gameOver() {
  if (!alive) return;
  alive=false;
  lives=Math.max(0,lives-1);
  pendingLifeRestore=true;
  ballMat.color.set(0xff0000); ballMat.emissive.set(0xff0000); ballMat.emissiveIntensity=1.5;
  setTimeout(showMathChallenge, 650);
}


// ── COLLISION ────────────────────────────────────────────────
function checkCollisions() {
  for (const c of chunks) {
    const cz=c.grp.position.z;

    for (const o of c.obs) {
      const wz=cz+o.zLocal;
      const wx=o.mesh.position.x;
      if (invincTimer>0) continue; // still invincible from last hit
      if (Math.abs(wz)<BALL_R+.25 && Math.abs(wx-pX)<BALL_R+.3 && pY<o.h-.15) {
        gameOver();
        return;
      }
    }

    for (const r of c.ramps) {
      if (!airborne && Math.abs(LANES[r.lane]-pX)<1.1
          && cz+r.zFront>-BALL_R && cz+r.zBack<BALL_R+2) {
        pVY=r.launchVY*(0.9+speed*.45); airborne=true;
      }
    }

    for (const coin of c.coins) {
      if (coin.collected) continue;
      const wz=cz+coin.zLocal;
      if (Math.abs(wz)<1.0 && Math.abs(coin.mesh.position.x-pX)<BALL_R+.35) {
        coin.collected=true; coin.mesh.visible=false; coinCount++;
        document.getElementById('coins-val').textContent=coinCount;
        // Spark burst at world-space coin position
        const cy3=Math.cos(currentYaw),sy3=Math.sin(currentYaw);
        const wx3=coin.mesh.position.x*cy3; const wz3=-coin.mesh.position.x*sy3;
        burstSparks(wx3, coin.mesh.position.y, wz3+cz);
        comboCount++; comboTimer=90;
        const mult=comboCount>=8?4:comboCount>=5?3:comboCount>=3?2:1;
        score+=10*mult;
        if (mult>1) {
          const labels=['','','×2 COMBO!','×3 CHAIN!','×4 MAX!!'];
          comboEl.textContent=labels[Math.min(mult,4)];
          comboEl.className='show'; comboHideTimer=80;
        }
      }
    }

  }
}

// ── MAIN LOOP ────────────────────────────────────────────────
let lastT=0;

function loop(t) {
  requestAnimationFrame(loop);
  const dt=Math.min(t-lastT,50); lastT=t;
  const frameScale=dt/(1000/60); // 1 at 60fps, >1 on slower frames
  const lerpByDt=(base)=>1-Math.pow(1-base, frameScale);
  const tSec=t*0.001;
  if (!alive){renderer.render(scene,camera);return;}

  // Speed
  const speedRamp=Math.min((score/700)*.03,.3);
  const targetSpeed=Math.min(.18+startSpeedBonus+speedRamp,.48);
  speed+=(targetSpeed-speed)*lerpByDt(.1);
  score+=speed*.5*frameScale;
  document.getElementById('score-val').textContent=Math.floor(score);

  if (invincTimer>0) invincTimer-=frameScale;

  // Combo decay
  if (comboTimer>0) {
    comboTimer-=frameScale;
    if (comboTimer<=0) comboCount=0;
  }
  if (comboHideTimer>0) {
    comboHideTimer-=frameScale;
    if (comboHideTimer<=0) comboEl.className='';
  }

  // Curve
  curveDist+=speed*frameScale;
  const targetYaw=0.3*Math.sin(curveDist*.0048);
  worldGrp.rotation.y+=(targetYaw-worldGrp.rotation.y)*lerpByDt(.03);
  const worldYaw=worldGrp.rotation.y;
  currentYaw=worldYaw;
  cameraYaw+=(worldYaw-cameraYaw)*lerpByDt(.015);
  const cosC=Math.cos(cameraYaw), sinC=Math.sin(cameraYaw);

  // Scroll chunks
  for (const c of chunks) {
    c.grp.position.z+=speed*frameScale;

    for (const o of c.obs) {
      if (!o.moving) continue;
      o.laneF+=o.moveDir*o.moveSpeed*frameScale;
      if (o.laneF>2){o.laneF=2;o.moveDir=-1;}
      if (o.laneF<0){o.laneF=0;o.moveDir=1;}
      const tx2=LANES[0]+(LANES[2]-LANES[0])*o.laneF/2;
      o.mesh.position.x+=(tx2-o.mesh.position.x)*lerpByDt(.2);
      o.cap.position.x=o.mesh.position.x;
    }

    for (const coin of c.coins) if (!coin.collected) coin.mesh.rotation.z+=.07*frameScale;
    if (c.grp.position.z>RECYCLE_Z) recycleChunk(c);
  }

  // Player physics
  const tgtX=LANES[pTarget];
  pX+=(tgtX-pX)*lerpByDt(.2);
  if (airborne){
    pVY-=GRAVITY*frameScale; pY+=pVY*frameScale;
    if (pY<=0){
      pY=0;pVY=0;airborne=false;
      ball.scale.set(1.3,.72,1.3); wire.scale.set(1.3,.72,1.3);
    }
  }

  // Ball roll
  const rr=(speed*frameScale)/BALL_R;
  ball.rotation.x-=rr; wire.rotation.x-=rr; band.rotation.x-=rr;

  // Squish/stretch
  if (airborne){
    const tv=pVY/.22;
    ball.scale.set(1-tv*.12,1+tv*.22,1-tv*.12);
    wire.scale.set(ball.scale.x,ball.scale.y,ball.scale.z);
  } else {
    ball.scale.x+=(1-ball.scale.x)*lerpByDt(.18);
    ball.scale.y+=(1-ball.scale.y)*lerpByDt(.18);
    ball.scale.z+=(1-ball.scale.z)*lerpByDt(.18);
    wire.scale.x=ball.scale.x; wire.scale.y=ball.scale.y; wire.scale.z=ball.scale.z;
  }

  ballMat.color.set(0xff3399); ballMat.emissiveIntensity=.7;

  pg.position.set(pX,pY,0);
  pg.rotation.z=-(tgtX-pX)*.22;

  const sf=Math.max(.35,1-pY*.38);
  blobShadow.scale.set(sf,sf,sf); shadowMat.opacity=sf*.28;

  // Ghost trail — only when moving fast
  trailTick+=frameScale;
  if (trailTick>=4 && speed>.28) {
    trailTick=0;
    // shift back
    for (let i=TRAIL_COUNT-1;i>0;i--){
      trailPool[i].x=trailPool[i-1].x;
      trailPool[i].y=trailPool[i-1].y;
      trailPool[i].z=trailPool[i-1].z;
    }
    // world-space position
    const cy2=Math.cos(worldYaw), sy2=Math.sin(worldYaw);
    trailPool[0].x=pX*cy2; trailPool[0].y=pY+BALL_R; trailPool[0].z=-pX*sy2;
  }
  trailPool.forEach((g,i)=>{
    const fade=(1-i/TRAIL_COUNT)*(speed>.28?1:0);
    if (fade>.02){
      g.mesh.visible=true;
      g.mesh.position.set(g.x,g.y,g.z);
      g.mat.opacity=fade*.2;
      g.mat.color.set(0xff3399);
    } else { g.mesh.visible=false; }
  });

  // Lights + camera
  playerLight.position.set(pX*Math.cos(worldYaw), pY+BALL_R*2, -pX*Math.sin(worldYaw));
  const pwx=pX*Math.cos(worldYaw), pwz=-pX*Math.sin(worldYaw);
  camera.position.set(pwx+12*sinC, 6+(airborne?pY*.1:0), pwz+12*cosC);
  camera.lookAt(pwx-6*sinC, 1, pwz-6*cosC);
  camera.rotateZ(-(worldYaw-cameraYaw)*1.8);

  // ── Speed bar ────────────────────────────────────────────────
  const speedPct=Math.min(100,((speed-.18)/.3)*100);
  speedFill.style.width=speedPct+'%';
  const r2=Math.floor(speedPct*2.55), g2=Math.floor(255-speedPct*1.8);
  speedFill.style.boxShadow=`0 0 ${6+speedPct*.1}px rgb(${r2},${g2},255)`;

  // ── Milestone flash ───────────────────────────────────────────
  const milestone=Math.floor(score/500);
  if (milestone>lastMilestone){
    lastMilestone=milestone;
    flashEl.className='pop';
    setTimeout(()=>flashEl.className='',200);
  }

  // ── Speed lines (radial streaks in screen-ish space) ──────────
  const speedT2=Math.max(0,(speed-.38)/.72);
  speedLines.forEach((sl,i)=>{
    sl.z+=speed*2.5*frameScale;
    if (sl.z>18){ sl.z=-30-Math.random()*20; sl.angle=((i/SLINE_COUNT)+Math.random()*.05)*Math.PI*2; sl.r=3+Math.random()*6; }
    const lineLen=speedT2*(2+sl.r*.4);
    const cx=camera.position.x, cy=camera.position.y-1, cz2=camera.position.z-8;
    const dx=Math.cos(sl.angle)*sl.r, dy=Math.sin(sl.angle)*sl.r*.55;
    sl.pos[0]=cx+dx; sl.pos[1]=cy+dy; sl.pos[2]=cz2+sl.z;
    sl.pos[3]=cx+dx*1.06; sl.pos[4]=cy+dy*1.06; sl.pos[5]=cz2+sl.z-lineLen;
    sl.geo.attributes.position.needsUpdate=true;
    const fadeEdge=Math.min(1,Math.min(sl.z+30,18-sl.z)/6);
    sl.mat.opacity=speedT2*.22*fadeEdge;
    sl.mat.color.set(0x00ffff);
  });

  // ── Obstacle warning pulse ────────────────────────────────────
  for (const c of chunks){
    const cz2=c.grp.position.z;
    for (const o of c.obs){
      const wz=cz2+o.zLocal;
      // When obstacle is 12–3 units away, pulse its emissive red
      if (wz>-12 && wz<3 && wz<0){
        const proximity=1-(wz/-12); // 0=far, 1=imminent
        const pulse=.6+.4*Math.sin(tSec*16*proximity);
        if (o.mesh.material.emissiveIntensity!==undefined)
          o.mesh.material.emissiveIntensity=.8+pulse*1.2*proximity;
      } else {
        if (o.mesh.material.emissiveIntensity!==undefined)
          o.mesh.material.emissiveIntensity=.8;
      }
    }
  }

  // ── Cityscape slow parallax drift ─────────────────────────────
  cityGrp.rotation.y=worldYaw*.15;
  cityGrp.position.x=Math.sin(curveDist*.003)*4;

  // ── Animated stars ───────────────────────────────────────────
  starLayers.forEach((L, li) => {
    // Drift stars slowly in Z (parallax with track motion)
    const posArr = L.pts.geometry.attributes.position.array;
    for (let i=0; i<posArr.length; i+=3) {
      posArr[i+2] += L.speed * speed * 60;
      if (posArr[i+2] > 400) posArr[i+2] -= 800;
    }
    L.pts.geometry.attributes.position.needsUpdate = true;
    // Gentle twinkle via opacity
    L.mat.opacity = .45 + .3 * Math.sin(tSec * (.4 + li*.3) + li * 1.2);
  });

  // ── Shooting stars ────────────────────────────────────────────
  shootSpawnTimer-=frameScale;
  if (shootSpawnTimer <= 0) {
    shootSpawnTimer = 90 + Math.floor(Math.random() * 180);
    const s = shooters.find(s=>!s.active);
    if (s) {
      s.active=true; s.timer=0; s.duration=18+Math.floor(Math.random()*18);
      s.x=(Math.random()-.5)*300; s.y=40+Math.random()*80; s.z=-100-Math.random()*200;
      const angle=Math.PI*.18+Math.random()*.2;
      const spd=5+Math.random()*8;
      s.dx=Math.cos(angle)*spd*(Math.random()<.5?1:-1);
      s.dy=-Math.sin(angle)*spd*.4;
      s.dz=spd*.6;
      s.len=8+Math.random()*14;
    }
  }
  shooters.forEach(s=>{
    if (!s.active) return;
    s.timer+=frameScale;
    const prog=s.timer/s.duration;
    s.x+=s.dx*frameScale; s.y+=s.dy*frameScale; s.z+=s.dz*frameScale;
    const fade=prog<.3?prog/.3:1-(prog-.3)/.7;
    const posArr=s.geo.attributes.position.array;
    posArr[0]=s.x; posArr[1]=s.y; posArr[2]=s.z;
    posArr[3]=s.x-s.dx*(s.len/Math.abs(s.dx)||1);
    posArr[4]=s.y-s.dy*(s.len/Math.abs(s.dx)||1);
    posArr[5]=s.z-s.dz*(s.len/Math.abs(s.dx)||1);
    s.geo.attributes.position.needsUpdate=true;
    s.mat.opacity=fade*.9;
    if (s.timer>=s.duration) { s.active=false; s.mat.opacity=0; }
  });

  // ── Coin spark update ─────────────────────────────────────────
  sparkPool.forEach(g=>{
    if (!g.active) return;
    g.timer-=frameScale;
    for(let i=0;i<10;i++){
      g.pos[i*3]  +=g.vels[i].vx*frameScale; g.vels[i].vx*=Math.pow(.88, frameScale);
      g.pos[i*3+1]+=g.vels[i].vy*frameScale; g.vels[i].vy-=.004*frameScale;
      g.pos[i*3+2]+=g.vels[i].vz*frameScale; g.vels[i].vz*=Math.pow(.88, frameScale);
    }
    g.geo.attributes.position.needsUpdate=true;
    g.mat.opacity=g.timer/28;
    if (g.timer<=0){ g.active=false; g.pts.visible=false; }
  });

  // ── Dynamic fog + background tint based on speed tier ─────────
  const speedT=Math.min(1,(speed-.18)/.3); // 0 at min, 1 at max
  const bgR=0.004+speedT*.04, bgG=0.004+speedT*.005, bgB=0.06+speedT*.04;
  scene.background.setRGB(bgR,bgG,bgB);
  scene.fog.color.setRGB(bgR,bgG,bgB);
  // Rails and grid pulse with speed
  const railPulse=.5+.5*Math.sin(tSec*6*(1+speedT*4));
  M.rail.color.setRGB(railPulse*.2+.1, .9+railPulse*.1, railPulse*.2+.9);
  M.grid.color.setRGB(0, .1+speedT*.18+railPulse*.08, .2+speedT*.2+railPulse*.1);

  checkCollisions();
  renderer.render(scene,camera);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
